# Workflow speculare della suite di accettazione esterna (tosdan/
# mock-server-acceptance-tests): a ogni push sul motore lancia i test black-box
# CONTRO QUESTO COMMIT, con la suite al suo main (o al ref passato col dispatch).
# È il gemello di black-box.yml nel repo della suite, con il pinning invertito:
# lì è fisso il commit della suite e si sceglie il motore, qui il contrario.
name: acceptance

on:
  push:
    branches: [main]
  # Pre-merge: le aree coperte SOLO dalla black-box (CORS/cookie/redirect su browser
  # reale, immagine standalone) devono rompersi prima del merge, non dopo.
  pull_request:
  workflow_dispatch:
    inputs:
      suite-ref:
        description: "Ref della suite di accettazione (branch, tag o SHA)"
        required: false
        default: "main"

jobs:
  black-box:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # I due repo affiancati: il compose della suite costruisce da ../mock-server.
      - name: Checkout del motore (questo commit)
        uses: actions/checkout@v4
        with:
          path: mock-server

      - name: Checkout della suite di accettazione
        uses: actions/checkout@v4
        with:
          repository: tosdan/mockxy-acceptance-tests
          ref: ${{ inputs.suite-ref || 'main' }}
          # Se il repo della suite è privato serve un fine-grained PAT (contents: read)
          # salvato come secret ACCEPTANCE_REPO_TOKEN; se è pubblico basta il default.
          token: ${{ secrets.ACCEPTANCE_REPO_TOKEN || github.token }}
          path: mock-server-external-tests

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mock-server-external-tests/package-lock.json

      # I browser Playwright pesano ~350-400 MB: cache con chiave sul lockfile della suite
      # (che pinna la versione di Playwright). Su cache hit restano solo le dipendenze di sistema.
      - name: Cache dei browser Playwright
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('mock-server-external-tests/package-lock.json') }}

      - name: Installa la suite
        working-directory: mock-server-external-tests
        run: npm ci

      - name: Installa i browser Playwright
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: mock-server-external-tests
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Dipendenze di sistema dei browser (cache già calda)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: mock-server-external-tests
        run: npx playwright install-deps chromium firefox webkit

      # L'attesa vive negli healthcheck del compose della suite, accanto alla topologia:
      # una nuova istanza aggiunta allo stack porta con sé il proprio criterio di prontezza,
      # niente liste di porte duplicate qui.
      - name: Avvia lo stack e attendi che sia sano
        working-directory: mock-server-external-tests
        run: docker compose up -d --build --wait --wait-timeout 90

      - name: Esegui i test
        working-directory: mock-server-external-tests
        run: npm test

      - name: Log dei container (solo su fallimento)
        if: failure()
        working-directory: mock-server-external-tests
        run: docker compose logs --no-color

      - name: Report Playwright (solo su fallimento)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: mock-server-external-tests/test-results/
          if-no-files-found: ignore

      - name: Spegni lo stack
        if: always()
        working-directory: mock-server-external-tests
        run: docker compose down
