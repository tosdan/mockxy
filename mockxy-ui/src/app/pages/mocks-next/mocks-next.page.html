<div class="mx-root absolute inset-0 flex flex-col overflow-clip mx-scroll text-foreground">
  <!-- TOPBAR -->
  <header class="relative z-30 flex h-14 shrink-0 items-center gap-4 border-b border-border bg-card px-5">
    <app-view-switcher current="catalogo" />
    <span class="h-6 w-px shrink-0 bg-border"></span>
    <div class="flex items-center gap-2.5">
      <span class="grid h-8 w-8 place-items-center rounded-lg bg-gradient-to-br from-brand to-[var(--brand-deep)] text-white ring-1 ring-white/10">
        <ng-icon name="lucideListTree" size="1.05rem" />
      </span>
      <div class="leading-tight">
        <div class="text-sm font-bold tracking-tight text-foreground">Mockxy</div>
        <div class="text-[10px] font-bold uppercase tracking-[0.18em] text-brand">{{ 'mocks.subtitle' | transloco }}</div>
      </div>
    </div>
    <div class="ml-auto flex items-center gap-2.5">
      <button ui-button variant="outline" (click)="openImport()">
        <ng-icon name="lucideUpload" size="0.95rem" />
        {{ 'mocks.importOpenapi' | transloco }}
      </button>
      <button ui-button [cdkMenuTriggerFor]="newMenu">
        <ng-icon name="lucidePlus" size="1rem" />
        {{ 'mocks.new' | transloco }}
        <ng-icon name="lucideChevronDown" size="0.8rem" class="opacity-70" />
      </button>
    </div>
  </header>

  <!-- BODY (catalogo e dettaglio sono "smart": leggono lo store iniettato) -->
  <div class="relative z-10 flex min-h-0 flex-1">
    <mocks-next-catalog class="flex min-h-0 shrink-0 flex-col" [style.width.px]="catalogWidth()" />
    <!-- divisore trascinabile: ridimensiona il catalogo (largh. persistita) -->
    <div
      class="relative z-20 -ml-px w-1.5 shrink-0 cursor-col-resize bg-transparent transition-colors hover:bg-brand/30"
      (pointerdown)="startResize($event)"
      (dblclick)="resetCatalogWidth()"
      role="separator"
      aria-orientation="vertical"
      [title]="'mocks.resizeHint' | transloco"
    ></div>
    <mocks-next-detail class="flex min-w-0 flex-1 flex-col" />
  </div>

  <!-- menu "Nuovo" (tipo definizione) -->
  <ng-template #newMenu>
    <div ui-menu>
      <button ui-menu-item (click)="openCreate('mock')">
        <ng-icon name="lucideLayers" size="0.9rem" class="text-type-mock" />
        <span class="flex-1">Mock</span>
      </button>
      <button ui-menu-item (click)="openCreate('handler')">
        <ng-icon name="lucideFileCode" size="0.9rem" class="text-type-handler" />
        <span class="flex-1">Handler</span>
      </button>
      <button ui-menu-item (click)="openCreate('middleware')">
        <ng-icon name="lucideCog" size="0.9rem" class="text-type-middleware" />
        <span class="flex-1">Middleware</span>
      </button>
    </div>
  </ng-template>
</div>
